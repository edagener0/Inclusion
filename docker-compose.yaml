services:
  backend:
    build: ./backend
    container_name: inclusion_backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  database:
    image: postgres:16
    container_name: postgres_db
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5433"

  redis:
    image: redis:latest
    container_name: redis_db
    ports:
      - "6379:6379"

volumes:
  postgres_data:

