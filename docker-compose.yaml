services:
  web:
    build: ./backend/
    container_name: inclusion_backend
    environment:
      - name=value
    
    depends_on:
      - db
      - redis
    
    ports:
      - "8000:8000"
  
  db:
    image: postgres:latest
    container_name: postgres_db
    environment:
      - name=value
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:latest
    container_name: redis_db

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web