services:
  database:
    image: postgres:16
    container_name: postgres_db
    env_file:
      - path: ./backend/.env
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:latest
    container_name: redis_db
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: inclusion_backend
    env_file:
      - path: ./backend/.env
    depends_on:
      - database
      - redis
    volumes:
      - media_data:/app/src/media
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - path: ./frontend/.env.production
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "80:80"

volumes:
  postgres_data:
  media_data:
